name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # The build job has NO `environment`, so it can run even before Pages is
  # enabled. configure-pages with `enablement: true` turns Pages on (with GitHub
  # Actions as the source), which also creates the github-pages environment the
  # deploy job needs. This avoids the chicken-and-egg where an environment-gated
  # job fails at startup before it can enable Pages.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Solvent is a pure static site with no build step: the repository root is
      # already the deployable site. Copy only the files that belong on the
      # published site (omit tests and dev tooling).
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r index.html styles.css assets vendor src _site/
          cp DESIGN.md _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
