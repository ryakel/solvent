name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Solvent is a pure static site with no build step: the repository root is
      # already the deployable site. We only prune files that don't belong on the
      # published site (tests, dev tooling) before uploading.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r index.html styles.css assets vendor src _site/
          cp DESIGN.md _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (with GitHub Actions as the source) from the workflow
          # itself, so the deploy doesn't depend on prior repo-settings state.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
