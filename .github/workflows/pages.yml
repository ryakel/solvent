name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Only redeploy when files that actually ship change. Commits that touch just
    # tests, docs, or tooling won't consume a Pages deployment — this keeps us well
    # under GitHub Pages' hourly deployment rate limit.
    paths:
      - 'index.html'
      - 'styles.css'
      - 'src/**'
      - 'assets/**'
      - 'vendor/**'
      - 'DESIGN.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build has NO environment, so it can enable Pages even from a cold repo.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pure static site: copy the shipping files into _site (omit tests/tooling).
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r index.html styles.css assets vendor src _site/
          cp DESIGN.md _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # First attempt; don't fail the job yet so we can retry a transient throttle.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Back off before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      # Second attempt clears brief throttles/races. (A full hourly-limit trip
      # still needs the window to reset — that's a GitHub-side cap.)
      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
